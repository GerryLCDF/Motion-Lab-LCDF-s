    <style>
        :root { --accent: #4facfe; --bg-panel: rgba(15, 15, 20, 0.9); }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }

        /* --- MENÚ & OVERLAY --- */
        #menu-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: 0.4s; z-index: 900; }
        #nav-container.open ~ #menu-overlay { opacity: 1; pointer-events: auto; }
        #nav-container { position: fixed; bottom: 20px; left: 20px; z-index: 1000; }
        #menu-toggle { width: 50px; height: 50px; background: var(--bg-panel); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; backdrop-filter: blur(10px); }
        #menu-toggle span { width: 25px; height: 3px; background: var(--accent); border-radius: 2px; }
        #menu-items { position: absolute; bottom: 65px; left: 0; width: 260px; background: var(--bg-panel); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; backdrop-filter: blur(15px); padding: 10px; display: none; flex-direction: column; gap: 5px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .menu-item { text-decoration: none; padding: 12px 15px; color: white; font-size: 13px; border-radius: 8px; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .menu-item:hover { background: rgba(79, 172, 254, 0.2); color: var(--accent); }
        .menu-item.active { border-left: 3px solid var(--accent); background: rgba(255,255,255,0.05); font-weight: bold; }
        #nav-container.open #menu-items { display: flex; }

        /* --- UI PANEL --- */
        #ui {
            position: absolute; top: 20px; left: 20px; width: 340px;
            background: var(--bg-panel); padding: 25px;
            border-radius: 20px; color: white; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px); z-index: 100;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        h2 { margin: 0 0 15px 0; font-size: 13px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; margin-bottom: 8px; color: rgba(255,255,255,0.5); text-transform: uppercase; }
        
        .row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        .label-text { font-size: 11px; width: 60px; color: rgba(255,255,255,0.8); }
        
        input[type="range"] { flex: 1; accent-color: var(--accent); cursor: pointer; }
        input[type="number"] { 
            width: 55px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            color: var(--accent); border-radius: 4px; padding: 4px; font-family: monospace; font-size: 11px; text-align: center; outline: none;
        }

        .color-pair { display: flex; align-items: center; gap: 8px; flex: 1; }
        input[type="color"] { width: 35px; height: 30px; border: none; border-radius: 4px; cursor: pointer; background: none; }
        input[type="text"] { width: 80px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 4px; border-radius: 4px; font-family: monospace; font-size: 11px; outline: none; }
        
        button { width: 100%; border: none; padding: 12px; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 11px; }
        .btn-swap { background: rgba(79, 172, 254, 0.15); border: 1px solid var(--accent); color: var(--accent); margin-bottom: 10px; }
        .btn-swap:hover { background: var(--accent); color: #000; }
        
        #recordBtn { background: var(--accent); color: #000; margin-top: 10px; }
        #recordBtn.recording { background: #ff4b2b; color: white; animation: pulse 1.5s infinite; }
        #stopBtn { background: #333; color: #ff4b2b; border: 1px solid #ff4b2b; display: none; margin-top: 8px; }
        #status { font-size: 10px; color: var(--accent); margin-top: 12px; text-align: center; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        .kofi-button { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--bg-panel); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(15px); }
        .kofi-button svg { width: 28px; height: 28px; fill: white; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="menu-overlay" onclick="toggleMenu()"></div>

<div id="ui">
    <h2>Discrete Sunset</h2>
    
    <div class="group">
        <label>Colores</label>
        <div class="row">
            <span class="label-text">Top:</span>
            <div class="color-pair"><input type="color" id="color_top" value="#4dc3ff"><input type="text" id="hex_top" value="#4DC3FF"></div>
        </div>
        <div class="row">
            <span class="label-text">Bottom:</span>
            <div class="color-pair"><input type="color" id="color_bottom" value="#262627"><input type="text" id="hex_bottom" value="#262627"></div>
        </div>
        <button class="btn-swap" onclick="swapColors()">INTERCAMBIAR</button>
    </div>

    <div class="group">
        <label>Parámetros del Haz</label>
        <div class="row">
            <span class="label-text">Distancia</span>
            <input type="range" id="beam_dist_s" min="0" max="0.3" step="0.001" value="0.03">
            <input type="number" id="beam_dist_n" step="0.001" value="0.03">
        </div>
        <div class="row">
            <span class="label-text">Altura</span>
            <input type="range" id="beam_height_s" min="0.001" max="0.1" step="0.001" value="0.05">
            <input type="number" id="beam_height_n" step="0.001" value="0.05">
        </div>
        <div class="row">
            <span class="label-text">Ancho</span>
            <input type="range" id="beam_width_s" min="0" max="0.5" step="0.001" value="0.376">
            <input type="number" id="beam_width_n" step="0.001" value="0.376">
        </div>
    </div>

    <div class="group">
        <label>Fases (Líneas)</label>
        <div class="row">
            <span class="label-text">Cantidad</span>
            <input type="range" id="phases_s" min="2" max="20" step="1" value="10">
            <input type="number" id="phases_n" value="10">
        </div>
    </div>

    <div class="group" style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
        <label>Exportación de Video</label>
        <button id="recordBtn" onclick="toggleRecording()">GRABAR 3 MINUTOS</button>
        <button id="stopBtn" onclick="stopRecordingEarly()">DETENER GRABACIÓN</button>
        <div id="status">Listo para grabar</div>
    </div>
</div>

<a href="https://ko-fi.com/gerardom86682" target="_blank" class="kofi-button"><svg viewBox="0 0 24 24"><path d="M23.881 8.948c-.773-4.085-4.859-4.593-4.859-4.593H.724c-.304 0-.55.245-.55.55v13.746c0 .305.246.55.55.55s.55-.245.55-.55V5.481h17.15c.01 0 3.324.086 3.931 3.3.589 3.12-2.146 3.967-3.483 4.09l.063 1.107c.05 0 4.654-.038 5.446-5.03zm-11.233 1.432c-1.122-1.253-2.946-1.253-4.068 0-1.122 1.252-1.122 3.284 0 4.537L10.5 17l1.92-2.083c1.122-1.253 1.122-3.285 0-4.537z"/></svg></a>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    function toggleMenu() { document.getElementById('nav-container').classList.toggle('open'); }

    let scene, camera, renderer, material;
    let mediaRecorder, recordedChunks = [], isRecording = false, timerInterval;

    const fragmentShader = `
        uniform vec2 u_res;
        uniform float u_time;
        uniform vec3 u_top_color;
        uniform vec3 u_bottom_color;
        uniform float u_beam_distance;
        uniform float u_beam_height;
        uniform float u_beam_width;
        uniform float u_total_phases;

        float rand(float n){ return fract(sin(n) * 43758.5453123); }
        float noise(float p){
            float fl = floor(p);
            float fc = fract(p);
            return mix(rand(fl), rand(fl + 1.0), fc);
        }
        float fmod(float x, float y) { return x - floor(x / y) * y; }

        void main() {
            vec2 uv = gl_FragCoord.xy / u_res.xy;
            float t = u_total_phases;
            float s = 1.0 / t;
            float d = fmod(uv.y, s);
            float i = floor(uv.y * t);
            float beam_pos = s - d - u_beam_distance;
            float ci = i + 1.0;
            float cit = ci / t;
            
            float h2 = u_beam_height / 2.0;
            float inner = pow(h2, 2.0) - pow(beam_pos - h2, 2.0);
            float beam_circle = (inner > 0.0) ? sqrt(inner) : 0.0;
            
            float effective_beam_width = u_beam_width * cit + beam_circle;
            float beam_x = fmod(u_time * noise(ci) * cit * 0.2, 1.0);
            float best_distance = min(abs(beam_x - uv.x), 1.0 - abs(beam_x - uv.x));
            
            if (beam_pos >= 0.0 && beam_pos <= u_beam_height && best_distance <= effective_beam_width) i += 1.0;
            
            i = clamp(i, 0.0, t - 1.0);
            vec3 col = mix(u_top_color, u_bottom_color, i / (t - 1.0));
            gl_FragColor = vec4(col, 1.0);
        }
    `;

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        material = new THREE.ShaderMaterial({
            uniforms: {
                u_time: { value: 0 },
                u_res: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                u_top_color: { value: new THREE.Color(0x4dc3ff) },
                u_bottom_color: { value: new THREE.Color(0x262627) },
                u_beam_distance: { value: 0.03 },
                u_beam_height: { value: 0.05 },
                u_beam_width: { value: 0.376 },
                u_total_phases: { value: 10.0 }
            },
            fragmentShader
        });

        scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));
        setupUI();
        animate();
    }

    function setupUI() {
        const u = material.uniforms;

        const syncColor = (pId, tId, key) => {
            const p = document.getElementById(pId), t = document.getElementById(tId);
            const update = (v) => { p.value = v; t.value = v.toUpperCase(); u[key].value.set(v); };
            p.oninput = (e) => update(e.target.value);
            t.oninput = (e) => { if(/^#[0-9A-F]{6}$/i.test(e.target.value)) update(e.target.value); };
        };
        syncColor('color_top', 'hex_top', 'u_top_color');
        syncColor('color_bottom', 'hex_bottom', 'u_bottom_color');

        const syncParam = (sId, nId, key) => {
            const s = document.getElementById(sId), n = document.getElementById(nId);
            const update = (v) => { s.value = v; n.value = v; u[key].value = parseFloat(v); };
            s.oninput = (e) => update(e.target.value);
            n.oninput = (e) => update(e.target.value);
        };
        syncParam('beam_dist_s', 'beam_dist_n', 'u_beam_distance');
        syncParam('beam_height_s', 'beam_height_n', 'u_beam_height');
        syncParam('beam_width_s', 'beam_width_n', 'u_beam_width');
        syncParam('phases_s', 'phases_n', 'u_total_phases');
    }

    function swapColors() {
        const t = document.getElementById('color_top'), b = document.getElementById('color_bottom');
        const tmp = t.value; t.value = b.value; b.value = tmp;
        t.dispatchEvent(new Event('input')); b.dispatchEvent(new Event('input'));
    }

    function animate() {
        requestAnimationFrame(animate);
        material.uniforms.u_time.value += 0.05;
        renderer.render(scene, camera);
    }

    async function toggleRecording() {
        if (isRecording) return;
        const btn = document.getElementById('recordBtn'), stopBtn = document.getElementById('stopBtn'), status = document.getElementById('status');
        const stream = renderer.domElement.captureStream(30);
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9', videoBitsPerSecond: 8000000 });
        recordedChunks = [];
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob), a = document.createElement('a');
            a.href = url; a.download = `discrete_sunset_LCDF.webm`; a.click();
            btn.innerText = "GRABAR 3 MINUTOS"; btn.classList.remove('recording'); stopBtn.style.display = "none"; status.innerText = "Listo para grabar"; isRecording = false;
        };
        mediaRecorder.start(); isRecording = true;
        btn.innerText = "GRABANDO..."; btn.classList.add('recording'); stopBtn.style.display = "block";
        const startTime = Date.now();
        timerInterval = setInterval(() => {
            const rem = (3 * 60 * 1000) - (Date.now() - startTime);
            if (rem <= 0) stopRecordingEarly();
            else {
                const m = Math.floor(rem / 60000), s = Math.floor((rem % 60000) / 1000);
                status.innerText = `TIEMPO: ${m}:${s < 10 ? '0' : ''}${s}`;
            }
        }, 1000);
    }

    function stopRecordingEarly() { if (mediaRecorder && mediaRecorder.state !== "inactive") { clearInterval(timerInterval); mediaRecorder.stop(); } }

    window.onresize = () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        material.uniforms.u_res.value.set(window.innerWidth, window.innerHeight);
    };

    init();
</script>
</body>
