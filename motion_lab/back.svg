  <circle cx="190" cy="180" r="75" fill="url(#bubble_grad)" mask="url(#bubble_mask)" stroke="#80FFFF" stroke-width="1" />
  
  <ellipse cx="175" cy="155" rx="30" ry="20" fill="white" fill-opacity="0.25" transform="rotate(-30, 175, 155)" />
