    <rect x="-60" y="-60" width="120" height="120" rx="15" fill="url(#grid_grad)" fill-opacity="0.7" />
    <rect x="-45" y="-45" width="20" height="20" rx="2" fill="#0A3625" />
    <rect x="-10" y="-45" width="20" height="20" rx="2" fill="#0A3625" />
