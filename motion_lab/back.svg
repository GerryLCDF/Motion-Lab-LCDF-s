<svg width="300" height="340" viewBox="0 0 300 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hex_grad" x1="150" y1="20" x2="150" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#80FFFF" />
      <stop offset="1" stop-color="#2EB2DE" />
    </linearGradient>
    
    <linearGradient id="grid_grad" x1="70" y1="120" x2="180" y2="230" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4facfe" />
      <stop offset="1" stop-color="#006694" />
    </linearGradient>

    <linearGradient id="bubble_grad" x1="210" y1="120" x2="210" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A0FFFF" stop-opacity="0.9" />
      <stop offset="0.5" stop-color="#4facfe" stop-opacity="0.8" />
      <stop offset="1" stop-color="#004466" stop-opacity="0.9" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <path d="M150 20L275 92.5V237.5L150 310L25 237.5V92.5L150 20Z" stroke="url(#hex_grad)" stroke-width="4" filter="url(#glow)" stroke-linejoin="round" />

