    <rect x="-45" y="-10" width="20" height="20" rx="2" fill="#0A3625" />
    <rect x="-10" y="-10" width="20" height="20" rx="2" fill="#0A3625" />
    <rect x="25" y="-10" width="20" height="20" rx="2" fill="#0A3625" />
    <rect x="-45" y="25" width="20" height="20" rx="2" fill="#0A3625" />
    <rect x="-10" y="25" width="20" height="20" rx="2" fill="#0A3625" />
    <rect x="25" y="25" width="20" height="20" rx="2" fill="#0A3625" />
